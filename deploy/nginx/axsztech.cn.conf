server {
    listen 80;
    listen [::]:80;
    server_name axsztech.cn www.axsztech.cn;

    root /var/www/html;
    index index.html;

    access_log /var/log/nginx/axsztech.access.log;
    error_log /var/log/nginx/axsztech.error.log warn;

    location = /api/caoliao/webhook {
        proxy_pass http://127.0.0.1:8787/api/caoliao/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        client_max_body_size 2m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
