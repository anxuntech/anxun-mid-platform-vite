name: Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    env:
      WEBHOOK_DEPLOY_PATH: ${{ secrets.WEBHOOK_DEPLOY_PATH }}
      WEBHOOK_PORT: ${{ secrets.WEBHOOK_PORT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote path exists
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Sync dist to remote server
        run: |
          rsync -az --delete \
            dist/ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Ensure remote webhook path exists
        if: ${{ env.WEBHOOK_DEPLOY_PATH != '' }}
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p '${{ env.WEBHOOK_DEPLOY_PATH }}'"

      - name: Sync webhook server to remote host
        if: ${{ env.WEBHOOK_DEPLOY_PATH != '' }}
        run: |
          rsync -az --delete \
            --exclude ".logs" \
            server \
            package.json \
            package-lock.json \
            ecosystem.config.cjs \
            deploy \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.WEBHOOK_DEPLOY_PATH }}/"

      - name: Restart webhook service with pm2
        if: ${{ env.WEBHOOK_DEPLOY_PATH != '' }}
        run: |
          REMOTE_WEBHOOK_PORT="${WEBHOOK_PORT:-8787}"
          REMOTE_WEBHOOK_SCRIPT="${{ env.WEBHOOK_DEPLOY_PATH }}/deploy/webhook/reload-webhook.sh"
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "test -f '${{ env.WEBHOOK_DEPLOY_PATH }}/server/index.js' && test -f '${{ env.WEBHOOK_DEPLOY_PATH }}/package.json' && test -f '${{ env.WEBHOOK_DEPLOY_PATH }}/package-lock.json' && test -f '${{ env.WEBHOOK_DEPLOY_PATH }}/ecosystem.config.cjs' && test -f '${REMOTE_WEBHOOK_SCRIPT}' && chmod +x '${REMOTE_WEBHOOK_SCRIPT}' && WEBHOOK_PORT='${REMOTE_WEBHOOK_PORT}' '${REMOTE_WEBHOOK_SCRIPT}' '${{ env.WEBHOOK_DEPLOY_PATH }}' '${REMOTE_WEBHOOK_PORT}'"
